<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="{{url_for('static', filename='css/signUp.css')}}">
</head>
<body>
  <div class="signup-container">
    <div class="form-box">
      <h1>Create Your Account</h1>
      <p class="subtitle">Sign up now</p>

      <form method="POST" id="signupForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="input-group">
          <input type="text" name="name" id="name" required>
          <label>Full Name</label>
        </div>
        <div class="input-group">
          <input type="email" name="email" id="email" required>
          <label>Email Address</label>
        </div>
        <div class="input-group">
          <input type="password" name="password" id="password" required>
          <label>Password</label>
        </div>
        <div class="input-group">
          <input type="password" name="confirm_password" id="confirm_password" required>
          <label>Confirm Password</label>
        </div>
        <button type="submit" class="signup-btn">Sign Up</button>
      </form>

      <div class="divider"><span>or sign up with</span></div>
      <div class="social-icons">
        <a href="/google_login"><img src="https://img.icons8.com/color/48/google-logo.png" alt="Google"></a>
        <a href="/linkedin_login"><img src="https://img.icons8.com/color/48/linkedin.png" alt="LinkedIn"></a>
      </div>
      <p class="links">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
